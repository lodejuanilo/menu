<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestro Menú</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Rye&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0f0b08; /* Fondo general ultra oscuro */
            --text-main: #ffffff;
            --text-muted: #cccccc;
            --accent: #f37021; /* Naranja fuego / Spicy */
            --accent-hover: #ff8137;
            --chalk-line: rgba(255, 255, 255, 0.85); /* Blanco tiza */
            --shadow-md: 0 15px 40px rgba(0, 0, 0, 0.8);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        /* Contenedor tipo celular con fondo de Madera Real y capa translúcida */
        .container {
            width: 100%;
            max-width: 480px;
            min-height: 100vh;
            padding-bottom: 110px; 
            position: relative;
            box-shadow: var(--shadow-md);
            border-left: 1px solid #1a120c;
            border-right: 1px solid #1a120c;
            overflow-x: hidden;

            /* CARGA TU IMAGEN DESDE TU REPOSITORIO */
            background-image: url('fondo-madera.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: scroll;
        }

        /* Capa 2: Filtro translúcido oscuro (bajado a 0.75 para que se note bien la madera) */
        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(12, 9, 7, 0.75); /* Controla la transparencia aquí */
            z-index: 1;
            pointer-events: none; 
        }

        /* Asegura que el contenido se renderice por encima del filtro translúcido */
        header, nav, main, .cta-container {
            position: relative;
            z-index: 2;
        }

        /* Header del negocio */
        header {
            text-align: center;
            padding: 55px 20px 30px 20px;
            position: relative;
            overflow: hidden;
            isolation: isolate; /* crea un contexto de apilamiento propio para el header */
        }

        /* Capa 1 del header: el GIF de fuego en loop, cubriendo todo el ancho */
        header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url('fuego-header.gif');
            background-size: cover;
            background-position: center bottom;
            background-repeat: no-repeat;
            z-index: 0;
        }

        /* Capa 2 del header: degradado oscuro para que el texto siga siendo legible sobre el fuego */
        header::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(180deg, rgba(0,0,0,0.65) 0%, rgba(0,0,0,0.35) 45%, rgba(0,0,0,0.75) 100%);
            z-index: 1;
        }

        /* El logo, el nombre y la frase quedan siempre por encima del fuego */
        header > * {
            position: relative;
            z-index: 2;
        }

        /* Estilos optimizados para el nuevo logo personalizado */
        .brand-logo {
            width: auto;
            height: 90px;
            max-width: 100%;
            object-fit: contain;
            margin: 0 auto 18px auto;
            display: block;
        }

        header h1 {
            font-family: 'Rye', serif;
            font-size: 28px;
            font-weight: 400;
            margin-bottom: 8px;
            letter-spacing: 1px;
            color: var(--text-main);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.9);
        }

        header p {
            font-size: 13px;
            color: var(--accent);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Categorías Navegación - Menú de tiza */
        .categories-nav {
            position: sticky;
            top: 0;
            background: rgba(18, 14, 11, 0.94);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 14px 16px;
            display: flex;
            gap: 10px;
            overflow-x: auto;
            white-space: nowrap;
            border-top: 2px solid var(--chalk-line);
            border-bottom: 2px solid var(--chalk-line);
            z-index: 100;
            scroll-behavior: smooth;
        }

        .categories-nav::-webkit-scrollbar { display: none; }
        .categories-nav { -ms-overflow-style: none; scrollbar-width: none; }

        /* Botones de navegación */
        .nav-btn {
            background: transparent;
            color: var(--text-muted);
            text-decoration: none;
            padding: 8px 16px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }

        .nav-btn:hover {
            color: var(--text-main);
            border: 1px dashed var(--chalk-line);
        }

        .nav-btn:active {
            transform: scale(0.95);
            background: var(--text-main);
            color: #121212;
        }

        /* Secciones de Menú */
        .menu-section {
            padding: 35px 24px 5px 24px;
            scroll-margin-top: 75px;
            animation: fadeIn 0.5s ease-out both;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .section-title {
            font-family: 'Rye', serif;
            font-size: 18px;
            font-weight: 400;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .section-title::before, .section-title::after {
            content: '';
            flex: 1;
            height: 3px;
            border-top: 1px solid var(--chalk-line);
            border-bottom: 1px solid var(--chalk-line);
        }

        /* Items del Menú en Pizarra de madera */
        .menu-item {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 18px 8px;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.12);
            gap: 15px;
            transition: all 0.25s ease;
        }

        /* Resaltar cuando tiene elementos en el carrito */
        .menu-item.selected {
            background-color: rgba(243, 112, 33, 0.08);
            border-bottom: 1px solid var(--accent);
        }

        .item-details {
            flex: 1;
        }

        .item-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: color 0.2s ease;
        }

        .menu-item.selected .item-title,
        .menu-item:hover .item-title {
            color: var(--accent);
        }

        .item-description {
            font-size: 13px;
            color: #bfaea3; /* Tono arena cálido para mejor lectura sobre madera */
            line-height: 1.5;
            font-weight: 400;
        }

        /* Contenedor lateral derecho (precio + selectores) */
        .item-action-zone {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
        }

        /* Precios destacados estilo tiza */
        .item-price {
            font-family: 'Rye', serif;
            font-size: 15px;
            color: var(--text-main);
            white-space: nowrap;
            background: transparent;
            border: 1px solid var(--chalk-line);
            padding: 4px 10px;
            transition: all 0.2s ease;
        }

        .menu-item.selected .item-price {
            background: var(--accent);
            border-color: var(--accent);
            color: #000;
        }

        /* Selector de Cantidades estilo rústico */
        .quantity-selector {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(0,0,0,0.4);
            border: 1px dashed rgba(255,255,255,0.3);
            padding: 2px;
        }

        .qty-btn {
            background: transparent;
            color: var(--text-main);
            border: none;
            width: 24px;
            height: 24px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s;
        }

        .qty-btn:hover {
            background: rgba(255,255,255,0.15);
        }

        .qty-number {
            font-size: 13px;
            font-weight: 700;
            min-width: 18px;
            text-align: center;
        }

        /* Botón de WhatsApp robusto y rústico */
        .cta-container {
            position: fixed;
            bottom: 24px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            padding: 0 24px;
            z-index: 999;
        }

        .whatsapp-btn {
            width: 100%;
            max-width: 432px;
            background-color: var(--text-main);
            color: #121212;
            text-decoration: none;
            text-align: center;
            padding: 16px;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 1px;
            text-transform: uppercase;
            box-shadow: 0 12px 35px rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s ease;
            border: 2px solid var(--text-main);
        }

        .whatsapp-btn.has-items {
            background-color: var(--accent);
            border-color: var(--accent);
            color: #ffffff;
        }

        @media (hover: hover) {
            .whatsapp-btn:hover {
                background-color: var(--accent);
                border-color: var(--accent);
                color: white;
                transform: translateY(-2px);
            }
        }

        .whatsapp-btn:active {
            transform: scale(0.97);
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <img src="logo.png" alt="Logo de la empresa" class="brand-logo">
            <h1 id="brand-name">Nombre de tu Marca</h1>
            <p id="brand-tagline">Tu frase o especialidad aquí</p>
        </header>

        <nav class="categories-nav" id="categories-nav"></nav>

        <main id="menu-container"></main>

        <div class="cta-container">
            <a href="#" id="whatsapp-link" target="_blank" class="whatsapp-btn">
                <span id="cta-text">&#x1F4F1; Hacer Pedido por WhatsApp</span>
            </a>
        </div>
    </div>

    <script>
        // ==========================================
        //  CONFIGURA LOS DATOS DE TU NEGOCIO AQUÍ
        // ==========================================
        const businessConfig = {
            name: "Lo de Juanilo",
            tagline: "Hacé tu pedido y te lo llevamos",
            whatsappNumber: "5493534418865", 
            defaultMessage: "¡Hola! Vi el menú en Instagram y me gustaría hacer un pedido."
        };

        // ==========================================
        //  ESTA ES TU BASE DE DATOS DEL MENÚ
        // ==========================================
        const menuData = [
            {
                category: "Hamburguesas",
                items: [
                    { id: "h1", title: "Clásica con Queso", description: "Medallón de 120g, cheddar premium, lechuga, tomate y salsa de la casa.", price: "$6.500" },
                    { id: "h2", title: "Bacon Burger", description: "Doble medallón, doble cheddar, bacon crujiente y salsa BBQ.", price: "$8.200" },
                    { id: "h3", title: "Veggie Burger", description: "Medallón de lentejas o garbanzos, queso, palta y rúcula.", price: "$6.800" }
                ]
            },
            {
                category: "Papas Fritas",
                items: [
                    { id: "p1", title: "Papas Simples", description: "Porción de papas rústicas bien crocantes.", price: "$3.500" },
                    { id: "p2", title: "Papas Cheddar & Bacon", description: "Baño de queso cheddar fundido y trocitos de bacon crocante.", price: "$5.000" }
                ]
            },
            {
                category: "Bebidas",
                items: [
                    { id: "b1", title: "Gaseosa 500ml", description: "Línea Coca-Cola o Pepsi bien fría.", price: "$1.800" },
                    { id: "b2", title: "Cerveza Artesanal", description: "Pinta de Honey, IPA o Golden según disponibilidad.", price: "$3.200" }
                ]
            }
        ];

        // Estado del Carrito Virtual
        const cart = {};

        // Función útil para transformar texto de precio "$6.500" a número entero 6500
        function parsePrice(priceString) {
            return parseInt(priceString.replace(/[^0-9]/g, ''), 10);
        }

        // Función para dar formato de moneda de vuelta a los totales
        function formatPrice(number) {
            return '$' + number.toLocaleString('es-AR');
        }

        // Detecta si el usuario está en un celular/tablet (donde wa.me abre la app nativa
        // y los emojis se muestran bien) o en una PC (donde suele pasar por web.whatsapp.com,
        // que a veces rompe emojis de 4 bytes mostrando "�"). En PC directamente no los mandamos.
        function isMobileDevice() {
            return /Android|iPhone|iPad|iPod|Mobile|Windows Phone/i.test(navigator.userAgent);
        }
        const useEmojis = isMobileDevice();

        // Actualiza el botón de envío y arma la URL dinámica de WhatsApp
        function updateWhatsAppButton() {
            const wppLink = document.getElementById("whatsapp-link");
            const ctaText = document.getElementById("cta-text");
            
            let totalItems = 0;
            let totalPrice = 0;
            let itemsText = "";

            // Recorremos los artículos agregados al carrito
            for (const id in cart) {
                if (cart[id].qty > 0) {
                    totalItems += cart[id].qty;
                    const subtotal = cart[id].qty * cart[id].numericPrice;
                    totalPrice += subtotal;
                    
                    itemsText += `• *${cart[id].qty}x* ${cart[id].title} (${formatPrice(subtotal)})\n`;
                }
            }

            if (totalItems > 0) {
                wppLink.classList.add("has-items");
                ctaText.innerText = `${String.fromCodePoint(0x1F4F1)} Enviar Pedido (${formatPrice(totalPrice)})`;

                // Construcción del mensaje final estilizado
                const emojiCarrito = useEmojis ? String.fromCodePoint(0x1F6D2) + ' ' : ''; // carrito de compras
                const emojiDinero = useEmojis ? String.fromCodePoint(0x1F4B0) + ' ' : '';  // dinero
                const emojiUbicacion = useEmojis ? String.fromCodePoint(0x1F4CD) + ' ' : ''; // ubicacion/pin

                const customMessage = `${emojiCarrito}*¡Hola ${businessConfig.name}! Quisiera hacer el siguiente pedido:*\n\n${itemsText}\n${emojiDinero}*Total: ${formatPrice(totalPrice)}*\n\n${emojiUbicacion}_¿Me confirman la demora? Gracias!_`;
                wppLink.href = `https://wa.me/${businessConfig.whatsappNumber}?text=${encodeURIComponent(customMessage)}`;
            } else {
                wppLink.classList.remove("has-items");
                ctaText.innerText = `${String.fromCodePoint(0x1F4F1)} Hacer Pedido por WhatsApp`;
                wppLink.href = `https://wa.me/${businessConfig.whatsappNumber}?text=${encodeURIComponent(businessConfig.defaultMessage)}`;
            }
        }

        // Modifica la cantidad de un ítem
        function changeQuantity(id, change, title, priceStr) {
            if (!cart[id]) {
                cart[id] = {
                    qty: 0,
                    title: title,
                    numericPrice: parsePrice(priceStr)
                };
            }

            cart[id].qty += change;

            if (cart[id].qty <= 0) {
                delete cart[id];
                document.getElementById(`qty-${id}`).innerText = "0";
                document.getElementById(`item-${id}`).classList.remove("selected");
            } else {
                document.getElementById(`qty-${id}`).innerText = cart[id].qty;
                document.getElementById(`item-${id}`).classList.add("selected");
            }

            updateWhatsAppButton();
        }

        // ==========================================
        //  LÓGICA AUTOMÁTICA
        // ==========================================
        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById("brand-name").innerText = businessConfig.name;
            document.getElementById("brand-tagline").innerText = businessConfig.tagline;
            
            updateWhatsAppButton();

            const navContainer = document.getElementById("categories-nav");
            const menuContainer = document.getElementById("menu-container");

            menuData.forEach((section, index) => {
                const sectionId = `section-${index}`;

                const navBtn = document.createElement("a");
                navBtn.href = `#${sectionId}`;
                navBtn.className = "nav-btn";
                navBtn.innerText = section.category;
                navContainer.appendChild(navBtn);

                const menuSection = document.createElement("section");
                menuSection.className = "menu-section";
                menuSection.id = sectionId;

                const title = document.createElement("h2");
                title.className = "section-title";
                title.innerText = section.category;
                menuSection.appendChild(title);

                section.items.forEach(item => {
                    const itemDiv = document.createElement("div");
                    itemDiv.className = "menu-item";
                    itemDiv.id = `item-${item.id}`;
                    
                    itemDiv.innerHTML = `
                        <div class="item-details">
                            <div class="item-title">${item.title}</div>
                            <div class="item-description">${item.description}</div>
                        </div>
                        <div class="item-action-zone">
                            <div class="item-price">${item.price}</div>
                            <div class="quantity-selector">
                                <button class="qty-btn" onclick="changeQuantity('${item.id}', -1, '${item.title}', '${item.price}')">-</button>
                                <span class="qty-number" id="qty-${item.id}">0</span>
                                <button class="qty-btn" onclick="changeQuantity('${item.id}', 1, '${item.title}', '${item.price}')">+</button>
                            </div>
                        </div>
                    `;
                    menuSection.appendChild(itemDiv);
                });

                menuContainer.appendChild(menuSection);
            });
        });
    </script>
</body>
</html>
